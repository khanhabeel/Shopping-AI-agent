<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Shopping Agent</title>
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:        #FF6B35;
      --orange-dark:   #e05520;
      --orange-light:  #fff1eb;
      --white:         #ffffff;
      --bg:            #f9f5f2;
      --surface:       #ffffff;
      --border:        #e8ddd6;
      --text:          #1e1e1e;
      --muted:         #7a6a60;
      --radius:        14px;
      --radius-sm:     8px;
      --shadow:        0 4px 18px rgba(255,107,53,0.10);
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.07);
      --transition:    0.2s ease;
    }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 40px;
    }

    /* ─── Header ─── */
    .app-header {
      width: 100%; max-width: 760px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--orange); color: var(--white);
      border-radius: var(--radius); padding: 18px 24px;
      margin-bottom: 18px; box-shadow: var(--shadow);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
    .logo svg { width: 28px; height: 28px; }
    .tagline { font-size: 12px; opacity: 0.85; margin-top: 1px; }
    .btn-clear {
      background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5);
      color: var(--white); padding: 7px 16px; border-radius: 50px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background var(--transition); white-space: nowrap;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.35); }

    /* ─── Controls ─── */
    .controls {
      width: 100%; max-width: 760px;
      background: var(--surface); border-radius: var(--radius);
      padding: 18px 20px; margin-bottom: 16px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1 1 180px; }
    .ctrl-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .ctrl-group select,
    .ctrl-group input[type="number"] {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 9px 12px; font-size: 14px; color: var(--text);
      background: var(--white); outline: none;
      transition: border-color var(--transition); width: 100%;
    }
    .ctrl-group select:focus,
    .ctrl-group input[type="number"]:focus { border-color: var(--orange); }

    /* ─── Chat Window ─── */
    .chat-window {
      width: 100%; max-width: 760px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .chat-messages {
      overflow-y: auto; padding: 20px 18px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 340px; max-height: 480px;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 40px 20px;
      color: var(--muted); gap: 10px; min-height: 280px;
    }
    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 14px; max-width: 300px; }
    .empty-state strong { color: var(--orange); font-size: 16px; }

    /* Message bubbles */
    .msg { display: flex; flex-direction: column; gap: 4px; }
    .msg.user { align-items: flex-end; }
    .msg.user .bubble {
      background: var(--orange); color: var(--white);
      border-radius: 18px 18px 4px 18px; padding: 12px 16px;
      max-width: 75%; font-size: 14px;
    }
    .msg.agent { align-items: flex-start; }
    .msg.agent .bubble {
      background: var(--orange-light); color: var(--text);
      border-radius: 18px 18px 18px 4px; padding: 14px 16px;
      max-width: 92%; font-size: 14px; border: 1px solid #f0d5c8;
    }
    .msg-meta { font-size: 11px; color: var(--muted); padding: 0 6px; }

    /* Product card */
    .product-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      margin-top: 10px; position: relative;
    }
    .product-card + .product-card { margin-top: 8px; }
    .product-name { font-weight: 700; font-size: 14px; color: var(--orange-dark); margin-bottom: 3px; }
    .product-price { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .product-reason { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .btn-copy {
      position: absolute; top: 10px; right: 10px;
      background: var(--orange-light); border: 1px solid #f0d5c8;
      color: var(--orange); font-size: 11px; font-weight: 600;
      padding: 4px 9px; border-radius: 50px; cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .btn-copy:hover { background: var(--orange); color: var(--white); }
    .btn-copy.copied { background: #28a745; color: var(--white); border-color: #28a745; }

    /* Loading dots */
    .msg.loading .bubble {
      background: var(--orange-light);
      border-radius: 18px 18px 18px 4px;
      padding: 14px 18px; border: 1px solid #f0d5c8;
      display: flex; align-items: center; gap: 6px;
    }
    .dot-loader { display: flex; gap: 5px; }
    .dot-loader span {
      width: 8px; height: 8px; background: var(--orange);
      border-radius: 50%; display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-7px); }
    }

    /* ─── Input Area ─── */
    .chat-input-area {
      border-top: 1px solid var(--border); padding: 14px 16px;
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--white);
    }
    .chat-input-area textarea {
      flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      resize: none; outline: none; line-height: 1.5;
      max-height: 100px; min-height: 42px;
      transition: border-color var(--transition); color: var(--text);
    }
    .chat-input-area textarea:focus { border-color: var(--orange); }
    .chat-input-area textarea::placeholder { color: #b0a099; }

    .btn-send {
      background: var(--orange); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      padding: 11px 20px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background var(--transition), transform var(--transition);
      display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;
    }
    .btn-send:hover:not(:disabled) { background: var(--orange-dark); transform: translateY(-1px); }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    /* ─── Responsive ─── */
    @media (max-width: 540px) {
      .tagline { display: none; }
      .ctrl-group { flex: 1 1 130px; }
      .msg.user .bubble { max-width: 88%; }
      .msg.agent .bubble { max-width: 98%; }
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 24px; font-size: 12px; color: #b0a099;
      text-align: center; border-top: 1px solid var(--border);
      padding-top: 14px; width: 100%; max-width: 760px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Intelligent Shopping Agent
    </div>
    <div class="tagline">Describe what you need — get AI-powered picks instantly</div>
  </div>
  <button class="btn-clear" id="btnClear">&#128465; Clear Chat</button>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="ctrl-group">
    <label>Category</label>
    <select id="category">
      <option value="">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Fashion">Fashion &amp; Clothing</option>
      <option value="Groceries">Groceries &amp; Food</option>
      <option value="Books">Books &amp; Education</option>
      <option value="Home & Kitchen">Home &amp; Kitchen</option>
      <option value="Sports & Outdoors">Sports &amp; Outdoors</option>
      <option value="Beauty & Personal Care">Beauty &amp; Personal Care</option>
      <option value="Toys & Games">Toys &amp; Games</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Budget Min ($)</label>
    <input type="number" id="budgetMin" placeholder="e.g. 50" min="0" />
  </div>
  <div class="ctrl-group">
    <label>Budget Max ($)</label>
    <input type="number" id="budgetMax" placeholder="e.g. 500" min="0" />
  </div>
</div>

<!-- CHAT WINDOW -->
<div class="chat-window">
  <div class="chat-messages" id="chatMessages">
    <div class="empty-state" id="emptyState">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="1.5">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <strong>What are you shopping for?</strong>
      <p>Type a request below — like <em>"suggest a budget laptop for coding under $600"</em> — and I'll find the best options for you.</p>
    </div>
  </div>
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="e.g. I need noise-cancelling headphones for travel under $200…" rows="1"></textarea>
    <button class="btn-send" id="btnSend">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      Ask AI
    </button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">Made with IBM Bob &nbsp;&middot;&nbsp; Powered by Groq AI</div>

<script>
  // ─── CONFIG ───────────────────────────────
  const CONFIG = {
    apiKey:   "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",
    model:    "llama-3.3-70b-versatile",
    endpoint: "https://api.groq.com/openai/v1/chat/completions"
  };

  // ─── DOM refs ─────────────────────────────
  const chatMessages = document.getElementById("chatMessages");
  const emptyState   = document.getElementById("emptyState");
  const userInput    = document.getElementById("userInput");
  const btnSend      = document.getElementById("btnSend");
  const btnClear     = document.getElementById("btnClear");
  const categoryEl   = document.getElementById("category");
  const budgetMinEl  = document.getElementById("budgetMin");
  const budgetMaxEl  = document.getElementById("budgetMax");

  // Conversation history for multi-turn context
  let history = [];

  // ─── Auto-grow textarea ───────────────────
  userInput.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });

  // Send on Enter (Shift+Enter = newline)
  userInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  btnSend.addEventListener("click", handleSend);
  btnClear.addEventListener("click", clearChat);

  // ─── System prompt ────────────────────────
  function buildSystemPrompt() {
    return "You are an expert shopping assistant. When a user asks for product recommendations, respond ONLY with a JSON array (no extra text, no markdown code fences) in this exact shape:\n[\n  {\n    \"name\": \"Product Name\",\n    \"price\": \"$XX \u2013 $YY\",\n    \"reason\": \"One or two sentences explaining why this fits the user's needs.\"\n  }\n]\nRules:\n- Return 3\u20135 products.\n- Use realistic, well-known brand/model names where possible.\n- Keep prices within the user's stated budget if given.\n- Focus on the selected category or infer it from the request.\n- Output ONLY the JSON array. No text before or after it.";
  }

  // ─── Main send handler ────────────────────
  async function handleSend() {
    var text = userInput.value.trim();
    if (!text) return;

    // Hide empty state
    emptyState.style.display = "none";

    // Build enriched message with controls context
    var enriched = text;
    var cat = categoryEl.value;
    var bMin = budgetMinEl.value;
    var bMax = budgetMaxEl.value;
    if (cat)  enriched += "\nCategory: " + cat;
    if (bMin) enriched += "\nMinimum budget: $" + bMin;
    if (bMax) enriched += "\nMaximum budget: $" + bMax;

    // Render user bubble
    appendUserBubble(text);

    // Reset input
    userInput.value = "";
    userInput.style.height = "auto";
    btnSend.disabled = true;

    // Show loading bubble
    var loadingEl = appendLoadingBubble();

    // Add to history
    history.push({ role: "user", content: enriched });

    try {
      var response = await fetch(CONFIG.endpoint, {
        method: "POST",
        headers: {
          "Content-Type":  "application/json",
          "Authorization": "Bearer " + CONFIG.apiKey
        },
        body: JSON.stringify({
          model: CONFIG.model,
          messages: [{ role: "system", content: buildSystemPrompt() }].concat(history),
          temperature: 0.7,
          max_tokens: 1024
        })
      });

      if (!response.ok) {
        var errData = await response.json().catch(function(){ return {}; });
        throw new Error((errData.error && errData.error.message) || "HTTP " + response.status);
      }

      var data = await response.json();
      var rawContent = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";

      // Save to history
      history.push({ role: "assistant", content: rawContent });

      loadingEl.remove();
      appendAgentBubble(rawContent);

    } catch (err) {
      loadingEl.remove();
      appendErrorBubble(err.message);
    } finally {
      btnSend.disabled = false;
      userInput.focus();
    }
  }

  // ─── Append user bubble ───────────────────
  function appendUserBubble(text) {
    var msg = document.createElement("div");
    msg.className = "msg user";
    msg.innerHTML = '<div class="bubble">' + escapeHTML(text) + '</div>' +
                    '<div class="msg-meta">' + timeNow() + '</div>';
    chatMessages.appendChild(msg);
    scrollToBottom();
  }

  // ─── Append loading bubble ────────────────
  function appendLoadingBubble() {
    var msg = document.createElement("div");
    msg.className = "msg loading agent";
    msg.innerHTML = '<div class="bubble">' +
      '<div class="dot-loader"><span></span><span></span><span></span></div>' +
      '<span style="font-size:13px;color:#7a6a60;margin-left:4px">Finding recommendations\u2026</span>' +
      '</div>';
    chatMessages.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  // ─── Append agent response ────────────────
  function appendAgentBubble(content) {
    var msg = document.createElement("div");
    msg.className = "msg agent";
    var products = tryParseProducts(content);
    var inner = "";

    if (products && products.length > 0) {
      inner = '<div class="bubble"><div style="font-size:13px;font-weight:600;color:#7a6a60;margin-bottom:8px;">Here are my top picks for you:</div>';
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        var cardId = "card-" + Date.now() + "-" + i;
        inner += '<div class="product-card" id="' + cardId + '">' +
          '<button class="btn-copy" onclick="copyCard(\'' + cardId + '\', this)">Copy</button>' +
          '<div class="product-name">'   + escapeHTML(p.name   || "") + '</div>' +
          '<div class="product-price">'  + escapeHTML(p.price  || "") + '</div>' +
          '<div class="product-reason">' + escapeHTML(p.reason || "") + '</div>' +
          '</div>';
      }
      inner += '</div>';
    } else {
      // Fallback: plain text
      inner = '<div class="bubble" style="white-space:pre-wrap;">' + escapeHTML(content) + '</div>';
    }

    inner += '<div class="msg-meta">' + timeNow() + ' &middot; Groq AI</div>';
    msg.innerHTML = inner;
    chatMessages.appendChild(msg);
    scrollToBottom();
  }

  // ─── Append error bubble ──────────────────
  function appendErrorBubble(errorMsg) {
    var msg = document.createElement("div");
    msg.className = "msg agent";
    msg.innerHTML = '<div class="bubble" style="border-color:#fca5a5;background:#fff5f5;">' +
      '<span style="color:#c0392b;font-weight:600;">&#9888; Error: </span>' +
      '<span style="color:#7a6a60;font-size:13px;">' + escapeHTML(errorMsg) + '</span></div>' +
      '<div class="msg-meta">' + timeNow() + '</div>';
    chatMessages.appendChild(msg);
    scrollToBottom();
  }

  // ─── Parse JSON products from AI response ─
  function tryParseProducts(text) {
    try {
      var parsed = JSON.parse(text.trim());
      if (Array.isArray(parsed)) return parsed;
    } catch(e) {}
    var match = text.match(/\[[\s\S]*\]/);
    if (match) {
      try {
        var parsed2 = JSON.parse(match[0]);
        if (Array.isArray(parsed2)) return parsed2;
      } catch(e) {}
    }
    return null;
  }

  // ─── Copy card to clipboard ───────────────
  function copyCard(cardId, btn) {
    var card   = document.getElementById(cardId);
    var name   = card.querySelector(".product-name").textContent;
    var price  = card.querySelector(".product-price").textContent;
    var reason = card.querySelector(".product-reason").textContent;
    var text   = name + "\nPrice: " + price + "\nWhy: " + reason;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { flashCopied(btn); });
    } else {
      var ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      flashCopied(btn);
    }
  }

  function flashCopied(btn) {
    btn.textContent = "✓ Copied!";
    btn.classList.add("copied");
    setTimeout(function() {
      btn.textContent = "Copy";
      btn.classList.remove("copied");
    }, 2000);
  }

  // ─── Clear chat ───────────────────────────
  function clearChat() {
    history = [];
    var msgs = chatMessages.querySelectorAll(".msg");
    msgs.forEach(function(m){ m.remove(); });
    emptyState.style.display = "";
    categoryEl.value  = "";
    budgetMinEl.value = "";
    budgetMaxEl.value = "";
    userInput.value   = "";
    userInput.style.height = "auto";
  }

  // ─── Utilities ────────────────────────────
  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }
</script>
</body>
</html>
